name: test

on:
  push:
    paths-ignore:
      - '**.md'
      - 'LICENSE'

jobs:
  luacheck:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mah0x211/lua-ci:latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: 'true'
      -
        name: Install luacheck
        run: luarocks install luacheck
      -
        name: Run luacheck
        run: luacheck .

  test:
    needs: luacheck
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mah0x211/lua-ci:latest
    strategy:
      fail-fast: false
      matrix:
        lua-version:
          - "5.1.:latest"
          - "5.2.:latest"
          - "5.3.:latest"
          - "5.4.:latest"
          - "lj-v2.1:latest"
    steps:
      -
        name: Switch Lua Version
        run: |
          lenv -g use ${{ matrix.lua-version }}
          lua -v || true
      -
        name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: 'true'
      -
        name: Install cmake (lexbor build)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends cmake
      -
        name: Build & Install
        run: |
          REFLOW_COVERAGE=1 luarocks make
      -
        name: Install test tools
        run: |
          luarocks install testcase
          luarocks install luacov
      -
        name: Run Test
        run: testcase ./test/
      -
        name: Upload lua coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          files: ./luacov.report.out, ./coverage/lcov.info
          flags: unittests

  asan:
    needs: luacheck
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mah0x211/lua-ci:latest
    steps:
      -
        name: Switch Lua Version
        run: |
          lenv -g use 5.1.:latest
          lua -v || true
      -
        name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: 'true'
      -
        name: Install cmake (lexbor build)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends cmake
      -
        name: Build & Install with AddressSanitizer
        run: |
          REFLOW_ASAN=1 luarocks make
      -
        name: Install test tools
        run: |
          luarocks install testcase
          luarocks install luacov
      -
        name: Run Test under AddressSanitizer
        run: |
          # Lua itself is not ASan-instrumented; preload the ASan runtime
          # so mallocs inside our .so get checked. Leak detection is
          # disabled because Lua keeps globals for the process lifetime.
          ASAN_LIB=$(gcc -print-file-name=libasan.so)
          echo "Using ASan runtime at: $ASAN_LIB"
          LD_PRELOAD=$ASAN_LIB \
            ASAN_OPTIONS=detect_leaks=0:abort_on_error=1:halt_on_error=1 \
            testcase ./test/
